name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: just publish ${{ steps.version.outputs.version }}

      - name: Install InnoSetup
        run: choco install innosetup --yes --no-progress

      - name: Add ISCC to PATH
        shell: bash
        run: echo "C:/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"

      - name: Build installer
        shell: cmd
        run: iscc /DAppVersion=${{ steps.version.outputs.version }} installer\gh-tray.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-tray-win-x64
          path: src/GhTray/bin/Release/net10.0-windows/win-x64/publish/GhTray.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-tray-installer
          path: installer/output/gh-tray-${{ steps.version.outputs.version }}-win-x64-setup.exe

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: -o CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update changelog for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: gh-tray-win-x64

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: gh-tray-installer

      - name: Rename artifact
        run: mv GhTray.exe gh-tray-win-x64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gh-tray-win-x64.exe
            gh-tray-*-win-x64-setup.exe
          body: ${{ steps.changelog.outputs.content }}

  winget:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: jsfr.gh-tray
          installers-regex: 'gh-tray-.*-win-x64-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
