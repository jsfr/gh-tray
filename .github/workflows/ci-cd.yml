name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/GhTray
          -c Release
          --self-contained
          -r win-x64
          -p:PublishSingleFile=true
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-tray-win-x64
          path: src/GhTray/bin/Release/net10.0-windows/win-x64/publish/GhTray.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: gh-tray-win-x64

      - name: Rename artifact
        run: mv GhTray.exe gh-tray-win-x64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: gh-tray-win-x64.exe
          generate_release_notes: true
