name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Restore tools
        run: dotnet tool restore

      - name: Check
        run: just check

      - name: Build
        run: just build

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: just publish ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-tray-win-x64
          path: src/GhTray/bin/Release/net10.0-windows/win-x64/publish/GhTray.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: -o CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update changelog for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: gh-tray-win-x64

      - name: Rename artifact
        run: mv GhTray.exe gh-tray-win-x64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: gh-tray-win-x64.exe
          body: ${{ steps.changelog.outputs.content }}
